name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # required for softprops/action-gh-release to create the release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime + build deps
        run: |
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm nightshift.spec

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: nightshift ${{ github.ref_name }}
          files: dist/nightshift.exe
          generate_release_notes: true
